name: "📣 Prospección de anunciantes"

on:
  schedule:
    # Tarde UTC para separar la búsqueda del envío de la mañana siguiente.
    - cron: "30 16 * * 1-4"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: ad-prospecting-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prospect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: "🔎 Buscar candidatos nuevos"
        env:
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          MAX_NEW_PROSPECTS: ${{ vars.MAX_NEW_PROSPECTS || '10' }}
          MAX_SEARCH_QUERIES: ${{ vars.MAX_SEARCH_QUERIES || '5' }}
          MAX_RESULTS_PER_QUERY: ${{ vars.MAX_RESULTS_PER_QUERY || '5' }}
          CUSTOM_SEARCH_ACCESS_DENIED_COOLDOWN_DAYS: ${{ vars.CUSTOM_SEARCH_ACCESS_DENIED_COOLDOWN_DAYS || '30' }}
        run: |
          python3 .github/scripts/ad_prospecting.py --write --report /tmp/ad-prospecting-report.md
          cat /tmp/ad-prospecting-report.md

      - name: "💾 Persistir candidatos nuevos"
        run: |
          if git diff --quiet -- docs/AD_PROSPECTS.json docs/AD_PROSPECTING_STATE.json; then
            echo "No hay candidatos nuevos que persistir."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/AD_PROSPECTS.json docs/AD_PROSPECTING_STATE.json
          git commit -m "chore: actualizar candidatos publicitarios"
          git push

      - name: "📝 Sincronizar issue de prospección"
        uses: actions/github-script@v8
        env:
          REPORT_PATH: /tmp/ad-prospecting-report.md
        with:
          script: |
            const fs = require('fs');
            const titlePrefix = '📣 Prospección diaria de anunciantes';
            const today = new Date().toISOString().slice(0, 10);
            const body = fs.readFileSync(process.env.REPORT_PATH, 'utf8');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'report',
              per_page: 100
            });

            const matching = issues
              .filter(issue => issue.title.startsWith(titlePrefix))
              .sort((a, b) => b.number - a.number);
            const title = `${titlePrefix} — ${today}`;

            if (matching.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: matching[0].number,
                title,
                body
              });

              for (const duplicate of matching.slice(1)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  body: `Sustituido por #${matching[0].number}. Mantenemos un único issue canónico de prospección de anunciantes.`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  state: 'closed',
                  state_reason: 'completed'
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['report']
              });
            }
