name: "☀️ Regeneración diaria del horóscopo"

on:
  schedule:
    - cron: '0 5 * * *'    # 05:00 UTC = 07:00 Madrid
  workflow_dispatch:

concurrency:
  group: daily-horoscope
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: "🔄 Regenerar páginas del horóscopo"
        run: bash sites/horoscopo-de-hoy/scripts/gen-pages.sh

      - name: "📤 Confirmar y subir cambios"
        run: |
          cd sites/horoscopo-de-hoy
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A public/
          if git diff --cached --quiet; then
            echo "No changes (same day content)"
          else
            git commit -m "chore(horoscopo): daily update $(date +%Y-%m-%d)"
            git push origin master
          fi
