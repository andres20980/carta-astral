name: "☀️ Regeneración diaria del horóscopo"

on:
  schedule:
    - cron: '0 5 * * *'    # 05:00 UTC = 07:00 Madrid
  workflow_dispatch:

concurrency:
  group: daily-horoscope
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: "🔄 Regenerar páginas del horóscopo"
        env:
          ADSENSE_AUTO_ADS_ENABLED: ${{ vars.ADSENSE_AUTO_ADS_ENABLED || '0' }}
        run: |
          set -euo pipefail
          bash sites/horoscopo-de-hoy/scripts/gen-pages.sh
          python3 .github/scripts/check_internal_urls.py sites/horoscopo-de-hoy/public horoscopo-de-hoy.es
          python3 .github/scripts/check_sitemap_indexability.py sites/horoscopo-de-hoy/public horoscopo-de-hoy.es
          SEO_SMOKE_DOMAIN="horoscopo-de-hoy.es" python3 .github/scripts/seo_smoke_html_checks.py sites/horoscopo-de-hoy/public/index.html \
            | jq -e '.title_present and .meta_description_present and .canonical_ok and .structured_data_present and .homepage_not_noindex and .h1_present and (.internal_copy_leaked | not)'

      - name: "📤 Confirmar y subir cambios"
        run: |
          set -euo pipefail
          cd sites/horoscopo-de-hoy
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A public/
          if git diff --cached --quiet; then
            echo "No changes (same day content)"
          else
            git commit -m "chore(horoscopo): daily update $(date +%Y-%m-%d)"
            git push origin master
          fi
