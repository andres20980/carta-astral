name: "🛡️ SEO Tech Smoke (All Sites)"

on:
  schedule:
    - cron: '40 6 * * *'
  workflow_dispatch:

concurrency:
  group: seo-tech-smoke
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  seo-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        include:
          - site: carta-astral
            domain: carta-astral-gratis.es
          - site: compatibilidad-signos
            domain: compatibilidad-signos.es
          - site: tarot-del-dia
            domain: tarot-del-dia.es
          - site: calcular-numerologia
            domain: calcular-numerologia.es
          - site: horoscopo-de-hoy
            domain: horoscopo-de-hoy.es
      fail-fast: false
    steps:
      - name: "🔎 Check ${{ matrix.domain }}"
        id: smoke
        shell: bash
        run: |
          set -euo pipefail
          SITE="https://${{ matrix.domain }}"
          failures=0
          report=""

          fetch() {
            curl -L -sS \
              --retry 3 \
              --retry-delay 2 \
              --retry-all-errors \
              --connect-timeout 10 \
              --max-time 30 \
              --user-agent "astro-cluster-seo-smoke/1.0" \
              "$1"
          }

          http_code() {
            curl -L -sS -o /dev/null -w "%{http_code}" \
              --retry 3 \
              --retry-delay 2 \
              --retry-all-errors \
              --connect-timeout 10 \
              --max-time 30 \
              --user-agent "astro-cluster-seo-smoke/1.0" \
              "$1" || echo "000"
          }

          for url in "$SITE/robots.txt" "$SITE/sitemap.xml" "$SITE/ads.txt" "$SITE/"; do
            code=$(http_code "$url")
            if [[ "$code" == "200" ]]; then
              report+="- ✅ ${url} -> ${code}"$'\n'
            else
              report+="- ❌ ${url} -> ${code}"$'\n'
              failures=$((failures + 1))
            fi
          done

          WWW_SITE="https://www.${{ matrix.domain }}"
          for url in "$WWW_SITE/" "$WWW_SITE/ads.txt"; do
            code=$(http_code "$url")
            if [[ "$code" == "200" ]]; then
              report+="- ✅ ${url} -> ${code}"$'\n'
            else
              report+="- ❌ ${url} -> ${code}"$'\n'
              failures=$((failures + 1))
            fi
          done

          # Check robots.txt declares Sitemap
          robots_content=$(fetch "$SITE/robots.txt" || true)
          if echo "$robots_content" | grep -iq 'Sitemap:'; then
            report+="- ✅ robots.txt declares Sitemap"$'\n'
          else
            report+="- ❌ robots.txt no Sitemap"$'\n'
            failures=$((failures + 1))
          fi

          # Check ads.txt
          ads_content=$(fetch "$SITE/ads.txt" || true)
          if echo "$ads_content" | grep -q 'pub-9368517395014039'; then
            report+="- ✅ ads.txt OK"$'\n'
          else
            report+="- ❌ ads.txt missing pub ID"$'\n'
            failures=$((failures + 1))
          fi

          ads_www_content=$(fetch "$WWW_SITE/ads.txt" || true)
          if echo "$ads_www_content" | grep -q 'pub-9368517395014039'; then
            report+="- ✅ www ads.txt OK"$'\n'
          else
            report+="- ❌ www ads.txt missing pub ID"$'\n'
            failures=$((failures + 1))
          fi

          # Legal pages (AdSense requirement)
          for page in "/privacy" "/terms" "/publicidad"; do
            code=$(http_code "$SITE$page")
            if [[ "$code" == "200" ]]; then
              report+="- ✅ ${page} OK"$'\n'
            else
              report+="- ❌ ${page} MISSING"$'\n'
              failures=$((failures + 1))
            fi
          done

          # SEO meta checks on index
          home_code=$(http_code "$SITE/")
          if [[ "$home_code" == "200" ]]; then
            html=$(fetch "$SITE/" || true)

            if echo "$html" | grep -Eiq '<title[^>]*>[^<]'; then
              report+="- ✅ <title> present"$'\n'
            else
              report+="- ❌ <title> missing"$'\n'
              failures=$((failures + 1))
            fi

            if echo "$html" | grep -Eiq "<meta[^>]+name=['\"]description['\"][^>]*content=['\"][^'\"]+['\"]|<meta[^>]+content=['\"][^'\"]+['\"][^>]*name=['\"]description['\"]"; then
              report+="- ✅ meta description present"$'\n'
            else
              report+="- ❌ meta description missing"$'\n'
              failures=$((failures + 1))
            fi

            if echo "$html" | grep -Eiq "<link[^>]+rel=['\"]canonical['\"][^>]*href=['\"]https://${{ matrix.domain }}(/|['\"])|<link[^>]+href=['\"]https://${{ matrix.domain }}(/|['\"])[^>]*rel=['\"]canonical['\"]"; then
              report+="- ✅ canonical points to primary domain"$'\n'
            else
              report+="- ❌ canonical missing or wrong host"$'\n'
              failures=$((failures + 1))
            fi

            if echo "$html" | grep -Eiq "type=['\"]application/ld\\+json['\"]"; then
              report+="- ✅ structured data present"$'\n'
            else
              report+="- ⚠️ no structured data"$'\n'
            fi

            if echo "$html" | grep -Eiq "pagead2\.googlesyndication\.com/pagead/js/adsbygoogle\.js\?client=ca-pub-9368517395014039"; then
              report+="- ✅ AdSense script present on homepage"$'\n'
            else
              report+="- ❌ AdSense script missing on homepage"$'\n'
              failures=$((failures + 1))
            fi

            if echo "$html" | grep -Eiq "<meta[^>]+name=['\"]robots['\"][^>]*content=['\"][^'\"]*noindex|<meta[^>]+content=['\"][^'\"]*noindex[^'\"]*['\"][^>]*name=['\"]robots['\"]"; then
              report+="- ❌ homepage contains noindex"$'\n'
              failures=$((failures + 1))
            else
              report+="- ✅ homepage not marked noindex"$'\n'
            fi

            if echo "$html" | grep -Eiq '<h1[^>]*>[^<]'; then
              report+="- ✅ homepage has H1"$'\n'
            else
              report+="- ❌ homepage missing H1"$'\n'
              failures=$((failures + 1))
            fi
          else
            report+="- ⚠️ skipped SEO meta checks because homepage returned ${home_code}"$'\n'
          fi

          echo "failures=$failures" >> "$GITHUB_OUTPUT"
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo "$report" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: "📋 Sync issue state"
        uses: actions/github-script@v8
        with:
          script: |
            const domain = '${{ matrix.domain }}';
            const titlePrefix = `🚨 SEO Smoke fail: ${domain}`;
            const title = titlePrefix;
            const body = `## SEO Tech Smoke — ${domain}\n\n${{ steps.smoke.outputs.report }}\n\n**Failures**: ${{ steps.smoke.outputs.failures }}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'seo,automated',
              per_page: 100
            });

            const matching = issues.filter(issue => issue.title.startsWith(titlePrefix));
            const primary = matching[0];

            if ('${{ steps.smoke.outputs.failures }}' !== '0') {
              if (primary) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: primary.number,
                  title,
                  body
                });
              } else {
                const created = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  labels: ['seo', 'automated']
                });
                matching.unshift(created.data);
              }

              for (const duplicate of matching.slice(1)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  body: `Superseded by #${matching[0].number}. Keeping one canonical SEO smoke issue per domain.`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  state: 'closed'
                });
              }
            } else {
              for (const issue of matching) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `SEO smoke passed on ${new Date().toISOString().slice(0, 10)}. Closing this automated report.`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
              }
            }
