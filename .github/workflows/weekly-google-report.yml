name: "📊 Informe Semanal de Google"

on:
  schedule:
    - cron: '0 9 * * 4'   # Jueves 09:00 UTC (mide impacto del auto-PR del martes)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: "🔑 Auth Google"
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      - name: "📊 Generate report"
        env:
          GA4_PROPERTY: "properties/531527723"
          ADSENSE_ACCOUNT: "accounts/pub-9368517395014039"
          GSC_SITES_JSON: >-
            [["carta-astral","carta-astral-gratis.es","sc-domain:carta-astral-gratis.es"],["compatibilidad-signos","compatibilidad-signos.es","sc-domain:compatibilidad-signos.es"],["tarot-del-dia","tarot-del-dia.es","sc-domain:tarot-del-dia.es"],["calcular-numerologia","calcular-numerologia.es","sc-domain:calcular-numerologia.es"],["horoscopo-de-hoy","horoscopo-de-hoy.es","sc-domain:horoscopo-de-hoy.es"]]
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          # GA4 token from Service Account
          pip -q install google-auth
          TOKEN=$(python3 -c "
          import google.auth
          import google.auth.transport.requests
          creds, _ = google.auth.default(scopes=['https://www.googleapis.com/auth/analytics.readonly','https://www.googleapis.com/auth/cloud-platform'])
          creds.refresh(google.auth.transport.requests.Request())
          print(creds.token)
          ")

          # OAuth token for GSC + AdSense (requires user credentials, not SA)
          OAUTH_TOKEN=""
          if [ -n "$GOOGLE_OAUTH_REFRESH_TOKEN" ] && [ -n "$GOOGLE_OAUTH_CLIENT_ID" ]; then
            OAUTH_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
              -d "client_id=$GOOGLE_OAUTH_CLIENT_ID" \
              -d "client_secret=$GOOGLE_OAUTH_CLIENT_SECRET" \
              -d "refresh_token=$GOOGLE_OAUTH_REFRESH_TOKEN" \
              -d "grant_type=refresh_token" | python3 -c "import sys,json;print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || echo "")
          fi

          echo "## 📊 Informe semanal del cluster — $(date +%Y-%m-%d)" > /tmp/report.md
          echo "" >> /tmp/report.md

          # Google auth health
          ANALYTICS_SA_STATUS="Pendiente: no se pudo comprobar Analytics por service account"
          if [ -n "$TOKEN" ]; then
            ANALYTICS_SA_STATUS="OK: service account / ADC con acceso a GA4"
          fi

          OAUTH_TOKEN="$OAUTH_TOKEN" \
          ANALYTICS_SA_STATUS="$ANALYTICS_SA_STATUS" \
          GOOGLE_AUTH_INCLUDE_RAW_JSON=0 \
          GOOGLE_AUTH_HEADING_LEVEL="###" \
          GOOGLE_AUTH_REPORT_TITLE="Estado de autenticación Google" \
          python3 .github/scripts/google_auth_audit.py >> /tmp/report.md
          echo "" >> /tmp/report.md

          if [ -n "$OAUTH_TOKEN" ]; then
            python3 .github/scripts/ga4_admin_watch.py \
              --property "$GA4_PROPERTY" \
              --token "$OAUTH_TOKEN" \
              --dimensions-manifest shared/ga4_custom_dimensions.json \
              --key-events-manifest shared/ga4_key_events.json \
              --heading-level "###" \
              --title "Estado de configuración GA4" >> /tmp/report.md
          else
            echo "### Estado de configuración GA4" >> /tmp/report.md
            echo "> No se pudo validar la Admin API de GA4 porque falta OAuth de usuario con \`analytics.edit\`." >> /tmp/report.md
          fi
          echo "" >> /tmp/report.md

          # GA4 traffic
          echo "### 🔍 Tráfico de GA4 (últimos 7 días)" >> /tmp/report.md
          TRAFFIC=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{
              "dateRanges": [{"startDate": "7daysAgo", "endDate": "today"}],
              "metrics": [
                {"name": "sessions"},
                {"name": "totalUsers"},
                {"name": "screenPageViews"},
                {"name": "averageSessionDuration"},
                {"name": "bounceRate"}
              ]
            }' \
            "https://analyticsdata.googleapis.com/v1beta/$GA4_PROPERTY:runReport")

          # Debug: log error if API failed
          GA4_ERR=$(echo "$TRAFFIC" | python3 -c "import sys,json;d=json.load(sys.stdin);e=d.get('error');print(e.get('message','') if e else '')" 2>/dev/null || echo "")
          if [ -n "$GA4_ERR" ]; then
            echo "> **Error de API**: $GA4_ERR" >> /tmp/report.md
            echo "" >> /tmp/report.md
          fi

          SESSIONS=$(echo "$TRAFFIC" | python3 -c "import sys,json;r=json.load(sys.stdin);print(r.get('rows',[{}])[0].get('metricValues',[{}])[0].get('value','N/A'))" 2>/dev/null || echo "N/A")
          USERS=$(echo "$TRAFFIC" | python3 -c "import sys,json;r=json.load(sys.stdin);print(r.get('rows',[{}])[0].get('metricValues',[{}])[1].get('value','N/A'))" 2>/dev/null || echo "N/A")
          VIEWS=$(echo "$TRAFFIC" | python3 -c "import sys,json;r=json.load(sys.stdin);print(r.get('rows',[{}])[0].get('metricValues',[{}])[2].get('value','N/A'))" 2>/dev/null || echo "N/A")
          DURATION=$(echo "$TRAFFIC" | python3 -c "import sys,json;r=json.load(sys.stdin);v=r.get('rows',[{}])[0].get('metricValues',[{}])[3].get('value','0');print(f'{float(v):.1f}s')" 2>/dev/null || echo "N/A")
          BOUNCE=$(echo "$TRAFFIC" | python3 -c "import sys,json;r=json.load(sys.stdin);v=r.get('rows',[{}])[0].get('metricValues',[{}])[4].get('value','0');print(f'{float(v)*100:.1f}%')" 2>/dev/null || echo "N/A")

          echo "| Métrica | Valor |" >> /tmp/report.md
          echo "|---------|-------|" >> /tmp/report.md
          echo "| Sesiones | $SESSIONS |" >> /tmp/report.md
          echo "| Usuarios | $USERS |" >> /tmp/report.md
          echo "| Páginas vistas | $VIEWS |" >> /tmp/report.md
          echo "| Duración media | $DURATION |" >> /tmp/report.md
          echo "| Rebote | $BOUNCE |" >> /tmp/report.md
          echo "" >> /tmp/report.md

          echo "### 🧩 Rendimiento por dominio del cluster" >> /tmp/report.md
          HOSTS=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{
              "dateRanges": [{"startDate": "7daysAgo", "endDate": "today"}],
              "dimensions": [{"name": "hostName"}],
              "metrics": [{"name": "sessions"}, {"name": "totalUsers"}, {"name": "screenPageViews"}],
              "orderBys": [{"metric": {"metricName": "sessions"}, "desc": true}],
              "limit": 10
            }' \
            "https://analyticsdata.googleapis.com/v1beta/$GA4_PROPERTY:runReport")

          echo "| Dominio | Sesiones | Usuarios | Páginas vistas |" >> /tmp/report.md
          echo "|---------|----------|----------|----------------|" >> /tmp/report.md
          echo "$HOSTS" | python3 -c "
          import sys,json
          r=json.load(sys.stdin)
          for row in r.get('rows',[]):
            host=row['dimensionValues'][0]['value']
            sessions=row['metricValues'][0]['value']
            users=row['metricValues'][1]['value']
            views=row['metricValues'][2]['value']
            print(f'| {host} | {sessions} | {users} | {views} |')
          " >> /tmp/report.md 2>/dev/null || echo "| Sin datos aún | — | — | — |" >> /tmp/report.md
          echo "" >> /tmp/report.md

          # GA4 key events
          echo "### 🎯 Conversiones (últimos 7 días)" >> /tmp/report.md
          EVENTS=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{
              "dateRanges": [{"startDate": "7daysAgo", "endDate": "today"}],
              "dimensions": [{"name": "eventName"}],
              "metrics": [{"name": "eventCount"}],
              "dimensionFilter": {
                "orGroup": {
                  "expressions": [
                    {"filter": {"fieldName": "eventName", "stringFilter": {"value": "tool_start"}}},
                    {"filter": {"fieldName": "eventName", "stringFilter": {"value": "chart_calculated"}}},
                    {"filter": {"fieldName": "eventName", "stringFilter": {"value": "compatibility_view"}}},
                    {"filter": {"fieldName": "eventName", "stringFilter": {"value": "numerology_calculated"}}},
                    {"filter": {"fieldName": "eventName", "stringFilter": {"value": "tarot_reading_complete"}}},
                    {"filter": {"fieldName": "eventName", "stringFilter": {"value": "internal_tool_click"}}},
                    {"filter": {"fieldName": "eventName", "stringFilter": {"value": "advertiser_cta_click"}}},
                    {"filter": {"fieldName": "eventName", "stringFilter": {"value": "interpretation_requested"}}},
                    {"filter": {"fieldName": "eventName", "stringFilter": {"value": "interpretation_generated"}}},
                    {"filter": {"fieldName": "eventName", "stringFilter": {"value": "upload_certificate"}}}
                  ]
                }
              }
            }' \
            "https://analyticsdata.googleapis.com/v1beta/$GA4_PROPERTY:runReport")

          echo "| Evento | Total |" >> /tmp/report.md
          echo "|--------|-------|" >> /tmp/report.md
          echo "$EVENTS" | python3 -c "
          import sys,json
          r=json.load(sys.stdin)
          for row in r.get('rows',[]):
            name=row['dimensionValues'][0]['value']
            count=row['metricValues'][0]['value']
            print(f'| {name} | {count} |')
          " >> /tmp/report.md 2>/dev/null || echo "| Sin datos aún | — |" >> /tmp/report.md
          echo "" >> /tmp/report.md

          echo "### 🔁 Recirculación interna y monetización directa" >> /tmp/report.md
          CLUSTER_ACTIONS=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{
              "dateRanges": [{"startDate": "7daysAgo", "endDate": "today"}],
              "dimensions": [{"name": "eventName"}],
              "metrics": [{"name": "eventCount"}],
              "dimensionFilter": {
                "orGroup": {
                  "expressions": [
                    {"filter": {"fieldName": "eventName", "stringFilter": {"value": "internal_tool_click"}}},
                    {"filter": {"fieldName": "eventName", "stringFilter": {"value": "advertiser_cta_click"}}}
                  ]
                }
              }
            }' \
            "https://analyticsdata.googleapis.com/v1beta/$GA4_PROPERTY:runReport")

          echo "| Señal | Total |" >> /tmp/report.md
          echo "|-------|-------|" >> /tmp/report.md
          echo "$CLUSTER_ACTIONS" | python3 -c "
          import sys,json
          r=json.load(sys.stdin)
          for row in r.get('rows',[]):
            name=row['dimensionValues'][0]['value']
            count=row['metricValues'][0]['value']
            print(f'| {name} | {count} |')
          " >> /tmp/report.md 2>/dev/null || echo "| Sin datos aún | — |" >> /tmp/report.md
          echo "" >> /tmp/report.md

          # GA4 traffic sources
          echo "### 📈 Fuentes de tráfico" >> /tmp/report.md
          SOURCES=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{
              "dateRanges": [{"startDate": "7daysAgo", "endDate": "today"}],
              "dimensions": [{"name": "sessionDefaultChannelGroup"}],
              "metrics": [{"name": "sessions"}, {"name": "totalUsers"}],
              "orderBys": [{"metric": {"metricName": "sessions"}, "desc": true}],
              "limit": 10
            }' \
            "https://analyticsdata.googleapis.com/v1beta/$GA4_PROPERTY:runReport")

          echo "| Canal | Sesiones | Usuarios |" >> /tmp/report.md
          echo "|-------|----------|----------|" >> /tmp/report.md
          echo "$SOURCES" | python3 -c "
          import sys,json
          r=json.load(sys.stdin)
          for row in r.get('rows',[]):
            ch=row['dimensionValues'][0]['value']
            s=row['metricValues'][0]['value']
            u=row['metricValues'][1]['value']
            print(f'| {ch} | {s} | {u} |')
          " >> /tmp/report.md 2>/dev/null || echo "| Sin datos aún | — | — |" >> /tmp/report.md
          echo "" >> /tmp/report.md

          # Extract organic sessions for milestone check
          ORGANIC_SESSIONS=$(echo "$SOURCES" | python3 -c "
          import sys,json
          r=json.load(sys.stdin)
          for row in r.get('rows',[]):
            if 'organic' in row['dimensionValues'][0]['value'].lower():
              print(row['metricValues'][0]['value']); break
          else: print('0')
          " 2>/dev/null || echo "0")

          # Extract event counts for milestone check
          CHART_CALC=$(echo "$EVENTS" | python3 -c "
          import sys,json
          r=json.load(sys.stdin)
          for row in r.get('rows',[]):
            if row['dimensionValues'][0]['value']=='chart_calculated':
              print(row['metricValues'][0]['value']); break
          else: print('0')
          " 2>/dev/null || echo "0")

          INTERP_GEN=$(echo "$EVENTS" | python3 -c "
          import sys,json
          r=json.load(sys.stdin)
          for row in r.get('rows',[]):
            if row['dimensionValues'][0]['value']=='interpretation_generated':
              print(row['metricValues'][0]['value']); break
          else: print('0')
          " 2>/dev/null || echo "0")

          GSC_VERIFIED_SITE_COUNT=0
          if [ -n "$OAUTH_TOKEN" ]; then
            GSC_SITES_API=$(curl -s -H "Authorization: Bearer $OAUTH_TOKEN" \
              "https://searchconsole.googleapis.com/webmasters/v3/sites" 2>/dev/null || echo "{}")
            GSC_VERIFIED_SITE_COUNT=$(echo "$GSC_SITES_API" | python3 -c "import json, os, sys; cluster={entry[2] for entry in json.loads(os.environ['GSC_SITES_JSON'])}; data=json.load(sys.stdin); print(sum(1 for entry in data.get('siteEntry', []) if entry.get('siteUrl') in cluster and entry.get('permissionLevel') == 'siteOwner'))" 2>/dev/null || echo "0")
          fi

          # Google Search Console — search performance (requires OAuth)
          echo "### 🔎 Google Search Console (últimos 28 días)" >> /tmp/report.md
          if [ -n "$OAUTH_TOKEN" ]; then
            GSC_START=$(date -d '28 days ago' +%Y-%m-%d)
            GSC_END=$(date -d '3 days ago' +%Y-%m-%d)
            GSC_GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            OAUTH_TOKEN="$OAUTH_TOKEN" GSC_START="$GSC_START" GSC_END="$GSC_END" GSC_SITES_JSON="$GSC_SITES_JSON" \
              GSC_OUTPUT_DIR="sites" GSC_GENERATED_AT="$GSC_GENERATED_AT" \
              python3 .github/scripts/weekly_gsc_report.py >> /tmp/report.md
          else
            echo "> GSC no disponible (faltan los secretos GOOGLE_OAUTH_*)" >> /tmp/report.md
          fi
          echo "" >> /tmp/report.md

          # AdSense earnings (best-effort, may fail if not yet approved)
          echo "### 💰 Ingresos de AdSense (últimos 7 días)" >> /tmp/report.md
          if [ -n "$OAUTH_TOKEN" ]; then
            ADSENSE=$(curl -s -H "Authorization: Bearer $OAUTH_TOKEN" \
              "https://adsense.googleapis.com/v2/$ADSENSE_ACCOUNT/reports:generate?dateRange=LAST_7_DAYS&metrics=ESTIMATED_EARNINGS&metrics=PAGE_VIEWS&metrics=IMPRESSIONS&metrics=CLICKS" 2>/dev/null || echo "{}")

            AD_EARNINGS=$(echo "$ADSENSE" | python3 -c "
            import sys,json
            r=json.load(sys.stdin)
            rows=r.get('rows',[])
            if rows:
              cells=rows[0].get('cells',[])
              earn=cells[0].get('value','0') if len(cells)>0 else '0'
              views=cells[1].get('value','0') if len(cells)>1 else '0'
              impr=cells[2].get('value','0') if len(cells)>2 else '0'
              clicks=cells[3].get('value','0') if len(cells)>3 else '0'
              print(f'| Ingresos | €{float(earn)/1000000:.2f} |')
              print(f'| Páginas vistas | {views} |')
              print(f'| Impresiones | {impr} |')
              print(f'| Clics | {clicks} |')
            else:
              print('| Estado | Sin datos de ingresos aún |')
            " 2>/dev/null || echo "| Estado | API no disponible |")
            echo "| Métrica | Valor |" >> /tmp/report.md
            echo "|---------|-------|" >> /tmp/report.md
            echo "$AD_EARNINGS" >> /tmp/report.md
          else
            echo "> AdSense/OAuth no configurado (falta GOOGLE_OAUTH_REFRESH_TOKEN)" >> /tmp/report.md
          fi
          echo "" >> /tmp/report.md

          # AdSense site readiness for the cluster
          if [ -n "$OAUTH_TOKEN" ]; then
            OAUTH_TOKEN="$OAUTH_TOKEN" \
            ADSENSE_ACCOUNT="$ADSENSE_ACCOUNT" \
            EXPECTED_DOMAINS_JSON='["carta-astral-gratis.es","compatibilidad-signos.es","tarot-del-dia.es","calcular-numerologia.es","horoscopo-de-hoy.es"]' \
            ADSENSE_INCLUDE_RAW_JSON=0 \
            ADSENSE_HEADING_LEVEL="###" \
            ADSENSE_REPORT_TITLE="Estado de sitios en AdSense" \
            python3 .github/scripts/adsense_site_watch.py >> /tmp/report.md
          else
            echo "### Estado de sitios en AdSense" >> /tmp/report.md
            echo "> AdSense no disponible porque falta OAuth de usuario. El refresh token debe incluir el scope \`https://www.googleapis.com/auth/adsense.readonly\`." >> /tmp/report.md
          fi
          echo "" >> /tmp/report.md

          # Growth milestone check
          BOUNCE_RAW=$(echo "$TRAFFIC" | python3 -c "import sys,json;r=json.load(sys.stdin);print(r.get('rows',[{}])[0].get('metricValues',[{}])[4].get('value','0'))" 2>/dev/null || echo "0")
          DURATION_RAW=$(echo "$TRAFFIC" | python3 -c "import sys,json;r=json.load(sys.stdin);print(r.get('rows',[{}])[0].get('metricValues',[{}])[3].get('value','0'))" 2>/dev/null || echo "0")

          SESSIONS=$SESSIONS USERS=$USERS VIEWS=$VIEWS \
          DURATION=$DURATION_RAW BOUNCE=$BOUNCE_RAW \
          ORGANIC_SESSIONS=$ORGANIC_SESSIONS \
          CHART_CALCULATED=$CHART_CALC \
          INTERPRETATION_GENERATED=$INTERP_GEN \
          GSC_VERIFIED_SITE_COUNT=$GSC_VERIFIED_SITE_COUNT \
          node .github/scripts/growth-milestone-check.js >> /tmp/report.md

          cat /tmp/report.md

      - name: "📝 Sync weekly report issue"
        uses: actions/github-script@v8
        with:
          script: |
            const titlePrefix = '📊 Informe semanal del cluster';
            const today = new Date().toISOString().slice(0, 10);
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'report',
              per_page: 100
            });

            const matching = issues.filter(issue => issue.title.startsWith(titlePrefix));
            const title = `${titlePrefix} — ${today}`;

            if (matching.length > 0) {
              const primary = matching[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: primary.number,
                title,
                body
              });

              for (const duplicate of matching.slice(1)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  body: `Sustituido por #${primary.number}. Mantenemos un único issue canónico para el informe semanal.`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  state: 'closed'
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['report']
              });
            }

      - name: "💾 Commit milestone updates"
        env:
          GA4_PROPERTY: "properties/531527723"
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          # Fetch all-time stats for the public counters
          pip -q install google-auth 2>/dev/null
          TOKEN=$(python3 -c "
          import google.auth, google.auth.transport.requests
          creds, _ = google.auth.default(scopes=['https://www.googleapis.com/auth/analytics.readonly'])
          creds.refresh(google.auth.transport.requests.Request())
          print(creds.token)
          " 2>/dev/null || echo "")

          TOTAL_CHARTS=0
          TOTAL_VISITORS=0
          if [ -n "$TOKEN" ]; then
            API="https://analyticsdata.googleapis.com/v1beta/$GA4_PROPERTY:runReport"
            AUTH=(-H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json")

            # 1) All-time chart_calculated events
            TOTAL_CHARTS=$(curl -s "${AUTH[@]}" -X POST \
              -d '{
                "dateRanges": [{"startDate": "2026-01-01", "endDate": "today"}],
                "metrics": [{"name": "eventCount"}],
                "dimensionFilter": {
                  "filter": {"fieldName": "eventName", "stringFilter": {"value": "chart_calculated"}}
                }
              }' "$API" \
              | python3 -c "import sys,json;r=json.load(sys.stdin);print(r.get('rows',[{}])[0].get('metricValues',[{}])[0].get('value','0'))" 2>/dev/null || echo "0")

            # 2) All-time total users (visitors)
            TOTAL_VISITORS=$(curl -s "${AUTH[@]}" -X POST \
              -d '{
                "dateRanges": [{"startDate": "2026-01-01", "endDate": "today"}],
                "metrics": [{"name": "totalUsers"}]
              }' "$API" \
              | python3 -c "import sys,json;r=json.load(sys.stdin);print(r.get('rows',[{}])[0].get('metricValues',[{}])[0].get('value','0'))" 2>/dev/null || echo "0")
          fi

          # Write public stats JSON for the commercial carta-astral landing
          python3 -c "
          import json
          from datetime import datetime
          stats = {
            'charts_calculated': int('${TOTAL_CHARTS}' or 0),
            'visitors': int('${TOTAL_VISITORS}' or 0),
            'updated': datetime.utcnow().strftime('%Y-%m-%dT%H:%MZ')
          }
          with open('sites/carta-astral/public/stats.json','w') as f: json.dump(stats, f)
          "

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/GROWTH_MILESTONES.json sites/carta-astral/public/stats.json sites/*/docs/SEO_GSC_QUERIES.json
          git diff --cached --quiet || git commit -m "chore: update growth milestone + public stats" && git push || true
