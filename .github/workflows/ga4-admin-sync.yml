name: "⚙️ Sincronización de GA4 Admin"

on:
  schedule:
    - cron: '20 7 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: "🔐 Obtener token OAuth"
        id: oauth
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_OAUTH_CLIENT_ID:-}" ] || [ -z "${GOOGLE_OAUTH_CLIENT_SECRET:-}" ] || [ -z "${GOOGLE_OAUTH_REFRESH_TOKEN:-}" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          token_json=$(curl -sS https://oauth2.googleapis.com/token \
            -d "client_id=$GOOGLE_OAUTH_CLIENT_ID" \
            -d "client_secret=$GOOGLE_OAUTH_CLIENT_SECRET" \
            -d "refresh_token=$GOOGLE_OAUTH_REFRESH_TOKEN" \
            -d "grant_type=refresh_token")

          access_token=$(echo "$token_json" | jq -r '.access_token // empty')
          if [ -z "$access_token" ]; then
            echo "$token_json"
            echo "missing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "missing=false" >> "$GITHUB_OUTPUT"
          {
            echo "token<<EOF"
            echo "$access_token"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "⚙️ Sincronizar dimensiones personalizadas"
        if: steps.oauth.outputs.missing != 'true'
        env:
          OAUTH_TOKEN: ${{ steps.oauth.outputs.token }}
        run: |
          python3 .github/scripts/ga4_custom_definitions.py \
            --property properties/531527723 \
            --token "$OAUTH_TOKEN" \
            --manifest shared/ga4_custom_dimensions.json \
            --apply

      - name: "🎯 Sincronizar eventos clave"
        if: steps.oauth.outputs.missing != 'true'
        env:
          OAUTH_TOKEN: ${{ steps.oauth.outputs.token }}
        run: |
          python3 .github/scripts/ga4_key_events.py \
            --property properties/531527723 \
            --token "$OAUTH_TOKEN" \
            --manifest shared/ga4_key_events.json \
            --apply

      - name: "🧾 Resumen"
        if: always()
        run: |
          if [ "${{ steps.oauth.outputs.missing }}" = "true" ]; then
            echo "No se pudo sincronizar GA4 Admin porque faltan GOOGLE_OAUTH_*." >> /tmp/ga4-admin-sync.md
          else
            echo "Sincronización GA4 Admin ejecutada." >> /tmp/ga4-admin-sync.md
            python3 .github/scripts/ga4_admin_watch.py \
              --property properties/531527723 \
              --token "${{ steps.oauth.outputs.token }}" \
              --dimensions-manifest shared/ga4_custom_dimensions.json \
              --key-events-manifest shared/ga4_key_events.json >> /tmp/ga4-admin-sync.md
          fi
          cat /tmp/ga4-admin-sync.md

      - name: "📝 Sincronizar issue canónico"
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const titlePrefix = '⚙️ Sincronización de GA4 Admin';
            const today = new Date().toISOString().slice(0, 10);
            const body = fs.readFileSync('/tmp/ga4-admin-sync.md', 'utf8');
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'report',
              per_page: 100
            });
            const matching = issues.filter(issue => issue.title.startsWith(titlePrefix));
            const title = `${titlePrefix} — ${today}`;
            if (matching.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: matching[0].number,
                title,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['report']
              });
            }
