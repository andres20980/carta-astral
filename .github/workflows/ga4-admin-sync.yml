name: "⚙️ Sincronización de GA4 Admin"

on:
  schedule:
    - cron: '20 7 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GOOGLE_CLOUD_QUOTA_PROJECT: ${{ secrets.GOOGLE_CLOUD_QUOTA_PROJECT }}
    steps:
      - uses: actions/checkout@v6

      - name: "🔑 Autenticar service account de Google"
        id: saauth
        continue-on-error: true
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      - name: "🔐 Obtener token GA4 Admin"
        id: ga4_admin
        if: steps.saauth.outcome == 'success'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.saauth.outputs.credentials_file_path }}
        run: |
          set -euo pipefail
          pip -q install google-auth
          access_token=$(python3 -c "
          import google.auth
          import google.auth.transport.requests
          creds, _ = google.auth.default(scopes=[
              'https://www.googleapis.com/auth/analytics.edit',
              'https://www.googleapis.com/auth/cloud-platform',
          ])
          creds.refresh(google.auth.transport.requests.Request())
          print(creds.token or '')
          ")

          if [ -z "$access_token" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "missing=false" >> "$GITHUB_OUTPUT"
          {
            echo "token<<EOF"
            echo "$access_token"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "⚙️ Sincronizar dimensiones personalizadas"
        if: steps.saauth.outcome == 'success' && steps.ga4_admin.outputs.missing != 'true'
        env:
          OAUTH_TOKEN: ${{ steps.ga4_admin.outputs.token }}
        run: |
          python3 .github/scripts/ga4_custom_definitions.py \
            --property properties/531527723 \
            --token "$OAUTH_TOKEN" \
            --manifest shared/ga4_custom_dimensions.json \
            --apply

      - name: "🎯 Sincronizar eventos clave"
        if: steps.saauth.outcome == 'success' && steps.ga4_admin.outputs.missing != 'true'
        env:
          OAUTH_TOKEN: ${{ steps.ga4_admin.outputs.token }}
        run: |
          python3 .github/scripts/ga4_key_events.py \
            --property properties/531527723 \
            --token "$OAUTH_TOKEN" \
            --manifest shared/ga4_key_events.json \
            --apply

      - name: "🧾 Resumen"
        if: always()
        run: |
          if [ "${{ steps.saauth.outcome }}" != "success" ] || [ "${{ steps.ga4_admin.outputs.missing }}" = "true" ]; then
            echo "No se pudo sincronizar GA4 Admin porque falta o falla FIREBASE_SERVICE_ACCOUNT." >> /tmp/ga4-admin-sync.md
          else
            echo "Sincronización GA4 Admin ejecutada." >> /tmp/ga4-admin-sync.md
            python3 .github/scripts/ga4_admin_watch.py \
              --property properties/531527723 \
              --token "${{ steps.ga4_admin.outputs.token }}" \
              --dimensions-manifest shared/ga4_custom_dimensions.json \
              --key-events-manifest shared/ga4_key_events.json >> /tmp/ga4-admin-sync.md
          fi
          cat /tmp/ga4-admin-sync.md

      - name: "📝 Sincronizar issue canónico"
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const titlePrefix = '⚙️ Sincronización de GA4 Admin';
            const legacyTitlePrefixes = [
              titlePrefix,
              '⚙️ Sincronización GA4 Admin'
            ];
            const today = new Date().toISOString().slice(0, 10);
            const body = fs.readFileSync('/tmp/ga4-admin-sync.md', 'utf8');
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'report',
              per_page: 100
            });
            const matching = issues
              .filter(issue => legacyTitlePrefixes.some(prefix => issue.title.startsWith(prefix)))
              .sort((a, b) => a.number - b.number);
            const title = `${titlePrefix} — ${today}`;
            if (matching.length > 0) {
              const primary = matching[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: primary.number,
                title,
                body
              });

              for (const duplicate of matching.slice(1)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  body: `Sustituido por #${primary.number}. Mantenemos un único issue canónico de sincronización GA4 Admin.`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  state: 'closed'
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['report']
              });
            }
