name: "🚀 Despliegue de todos los sitios"

on:
  push:
    branches: [master]
    paths:
      - 'sites/*/public/**'
      - 'sites/*/scripts/**'
      - 'sites/*/firebase.json'
      - 'shared/**'
      - '.github/workflows/deploy-all-sites.yml'
  workflow_dispatch:
    inputs:
      site:
        description: 'Sitio a desplegar (vacío = todos los modificados)'
        required: false
        type: choice
        options:
          - all
          - carta-astral
          - compatibilidad-signos
          - tarot-del-dia
          - calcular-numerologia
          - horoscopo-de-hoy
      run_lighthouse:
        description: 'Ejecutar Lighthouse tras desplegar'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      has_sites: ${{ steps.set-matrix.outputs.has_sites }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - id: set-matrix
        run: |
          set -euo pipefail
          ALL_SITES=(carta-astral compatibilidad-signos tarot-del-dia calcular-numerologia horoscopo-de-hoy)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.site }}" = "all" ] || [ -z "${{ inputs.site }}" ]; then
              SITES=("${ALL_SITES[@]}")
            else
              SITES=("${{ inputs.site }}")
            fi
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            SITES=()
            for site in "${ALL_SITES[@]}"; do
              if echo "$CHANGED" | grep -q "sites/${site}/" || echo "$CHANGED" | grep -q "shared/"; then
                SITES+=("$site")
              fi
            done
          fi

          if [ ${#SITES[@]} -eq 0 ]; then
            echo "has_sites=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_sites=true" >> "$GITHUB_OUTPUT"
          fi
          echo "matrix=$(printf '%s\n' "${SITES[@]}" | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_sites == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        site: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: "⚙️ Preparar Node"
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: "🧭 Resolver proyecto y credenciales"
        id: config
        shell: bash
        env:
          FIREBASE_SA_CARTA_ASTRAL: ${{ secrets.FIREBASE_SA_CARTA_ASTRAL }}
          FIREBASE_SA_COMPATIBILIDAD_SIGNOS: ${{ secrets.FIREBASE_SA_COMPATIBILIDAD_SIGNOS }}
          FIREBASE_SA_TAROT_DEL_DIA: ${{ secrets.FIREBASE_SA_TAROT_DEL_DIA }}
          FIREBASE_SA_CALCULAR_NUMEROLOGIA: ${{ secrets.FIREBASE_SA_CALCULAR_NUMEROLOGIA }}
          FIREBASE_SA_HOROSCOPO_DE_HOY: ${{ secrets.FIREBASE_SA_HOROSCOPO_DE_HOY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          case "${{ matrix.site }}" in
            carta-astral)
              project_id="carta-astral-f4ab9"
              domain="carta-astral-gratis.es"
              gsc_site_url="sc-domain:carta-astral-gratis.es"
              service_account="${FIREBASE_SA_CARTA_ASTRAL:-$FIREBASE_SERVICE_ACCOUNT}"
              ;;
            compatibilidad-signos)
              project_id="compat-signos-es"
              domain="compatibilidad-signos.es"
              gsc_site_url="sc-domain:compatibilidad-signos.es"
              service_account="${FIREBASE_SA_COMPATIBILIDAD_SIGNOS:-$FIREBASE_SERVICE_ACCOUNT}"
              ;;
            tarot-del-dia)
              project_id="tarot-del-dia-es"
              domain="tarot-del-dia.es"
              gsc_site_url="sc-domain:tarot-del-dia.es"
              service_account="${FIREBASE_SA_TAROT_DEL_DIA:-$FIREBASE_SERVICE_ACCOUNT}"
              ;;
            calcular-numerologia)
              project_id="calc-numerologia-es"
              domain="calcular-numerologia.es"
              gsc_site_url="sc-domain:calcular-numerologia.es"
              service_account="${FIREBASE_SA_CALCULAR_NUMEROLOGIA:-$FIREBASE_SERVICE_ACCOUNT}"
              ;;
            horoscopo-de-hoy)
              project_id="horoscopo-hoy-es"
              domain="horoscopo-de-hoy.es"
              gsc_site_url="sc-domain:horoscopo-de-hoy.es"
              service_account="${FIREBASE_SA_HOROSCOPO_DE_HOY:-$FIREBASE_SERVICE_ACCOUNT}"
              ;;
            *)
              echo "Unknown site: ${{ matrix.site }}" >&2
              exit 1
              ;;
          esac

          if [ -z "$service_account" ]; then
            echo "Missing Firebase service account secret for ${{ matrix.site }}" >&2
            exit 1
          fi

          echo "projectId=$project_id" >> "$GITHUB_OUTPUT"
          echo "domain=$domain" >> "$GITHUB_OUTPUT"
          echo "gscSiteUrl=$gsc_site_url" >> "$GITHUB_OUTPUT"
          {
            echo "firebaseServiceAccount<<EOF"
            echo "$service_account"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "🏗️ Generar sitio estático si hace falta"
        shell: bash
        env:
          ADSENSE_AUTO_ADS_ENABLED: ${{ vars.ADSENSE_AUTO_ADS_ENABLED || '0' }}
        run: |
          set -euo pipefail
          site_dir="sites/${{ matrix.site }}"
          generated=0

          for script_path in "$site_dir/scripts/gen-pages.sh" "$site_dir/scripts/gen-sign-pages.sh"; do
            if [ -f "$script_path" ]; then
              echo "Generating ${{ matrix.site }} with $script_path"
              bash "$script_path"
              generated=1
            fi
          done

          if [ "$generated" -eq 0 ]; then
            echo "No generator script for ${{ matrix.site }}"
          fi

          source shared/config.sh
          adsense_apply_head_snippet_to_file "$site_dir/public/index.html"

          if [ ! -d "$site_dir/public" ]; then
            echo "Expected $site_dir/public to exist before deploy" >&2
            exit 1
          fi

      - name: "🧱 Comprobar URLs internas generadas"
        shell: bash
        env:
          DOMAIN: ${{ steps.config.outputs.domain }}
        run: |
          set -euo pipefail
          python3 .github/scripts/check_internal_urls.py "sites/${{ matrix.site }}/public" "$DOMAIN"

      - name: "🗺️ Comprobar indexabilidad del sitemap"
        shell: bash
        env:
          DOMAIN: ${{ steps.config.outputs.domain }}
        run: |
          set -euo pipefail
          python3 .github/scripts/check_sitemap_indexability.py "sites/${{ matrix.site }}/public" "$DOMAIN"

      - name: "🔥 Desplegar ${{ matrix.site }}"
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ steps.config.outputs.firebaseServiceAccount }}
          FIREBASE_PROJECT_ID: ${{ steps.config.outputs.projectId }}
        run: |
          set -euo pipefail

          creds_file="$RUNNER_TEMP/firebase-${{ matrix.site }}.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$creds_file"
          chmod 600 "$creds_file"

          export GOOGLE_APPLICATION_CREDENTIALS="$creds_file"
          cd "sites/${{ matrix.site }}"
          npx firebase-tools@15.15.0 deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive

      - name: "📮 Enviar sitemap a GSC (no bloqueante)"
        shell: bash
        env:
          DOMAIN: ${{ steps.config.outputs.domain }}
          GSC_SITE_URL: ${{ steps.config.outputs.gscSiteUrl }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_CLOUD_QUOTA_PROJECT: ${{ secrets.GOOGLE_CLOUD_QUOTA_PROJECT }}
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_OAUTH_CLIENT_ID:-}" ] || [ -z "${GOOGLE_OAUTH_CLIENT_SECRET:-}" ] || [ -z "${GOOGLE_OAUTH_REFRESH_TOKEN:-}" ]; then
            echo "::warning::Missing GOOGLE_OAUTH_* secrets; skipping GSC sitemap submit"
            exit 0
          fi

          token_json=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 https://oauth2.googleapis.com/token \
            -d "client_id=$GOOGLE_OAUTH_CLIENT_ID" \
            -d "client_secret=$GOOGLE_OAUTH_CLIENT_SECRET" \
            -d "refresh_token=$GOOGLE_OAUTH_REFRESH_TOKEN" \
            -d "grant_type=refresh_token" || true)

          access_token=$(echo "$token_json" | jq -r '.access_token // empty')
          if [ -z "$access_token" ]; then
            echo "$token_json"
            echo "::warning::Could not mint OAuth access token for GSC sitemap submit"
            exit 0
          fi

          site_url_enc=$(python3 -c "import urllib.parse;print(urllib.parse.quote('${GSC_SITE_URL}',''))")
          sitemap_url="https://${DOMAIN}/sitemap.xml"
          sitemap_enc=$(python3 -c "import urllib.parse;print(urllib.parse.quote('${sitemap_url}',''))")

          headers=(-H "Authorization: Bearer $access_token")
          if [ -n "${GOOGLE_CLOUD_QUOTA_PROJECT:-}" ]; then
            headers+=(-H "X-Goog-User-Project: ${GOOGLE_CLOUD_QUOTA_PROJECT}")
          fi

          code=$(curl -sS --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 -o /tmp/gsc-submit-response.json -w "%{http_code}" \
            -X PUT \
            "${headers[@]}" \
            "https://searchconsole.googleapis.com/webmasters/v3/sites/${site_url_enc}/sitemaps/${sitemap_enc}")

          if [ "$code" = "200" ] || [ "$code" = "204" ]; then
            echo "Sitemap submitted to GSC for ${DOMAIN}"
          else
            echo "::warning::GSC sitemap submit returned HTTP ${code} for ${DOMAIN}"
            cat /tmp/gsc-submit-response.json || true
          fi

  lighthouse:
    needs:
      - detect-changes
      - deploy
    if: github.event_name == 'workflow_dispatch' && inputs.run_lighthouse == true && needs.detect-changes.outputs.has_sites == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        site: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: "🧭 Resolver URL del sitio"
        id: config
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.site }}" in
            carta-astral) domain="carta-astral-gratis.es" ;;
            compatibilidad-signos) domain="compatibilidad-signos.es" ;;
            tarot-del-dia) domain="tarot-del-dia.es" ;;
            calcular-numerologia) domain="calcular-numerologia.es" ;;
            horoscopo-de-hoy) domain="horoscopo-de-hoy.es" ;;
            *)
              echo "Unknown site: ${{ matrix.site }}" >&2
              exit 1
              ;;
          esac
          echo "url=https://${domain}/" >> "$GITHUB_OUTPUT"

      - name: "📊 Lighthouse (todos los sitios)"
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.config.outputs.url }}
          configPath: .github/lighthouserc.json
          uploadArtifacts: true
          artifactName: lighthouse-results-${{ matrix.site }}
