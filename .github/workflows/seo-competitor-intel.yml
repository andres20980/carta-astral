name: "🕵️ Competitor Intel"

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:
    inputs:
      site:
        description: 'Site to analyze (auto = rotating cluster schedule)'
        required: false
        default: auto
        type: choice
        options:
          - auto
          - carta-astral
          - compatibilidad-signos
          - tarot-del-dia
          - calcular-numerologia
          - horoscopo-de-hoy
      force:
        description: 'Force run even if intel is recent'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  intel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: "⚙️ Setup Node"
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: "🧭 Select site"
        id: select
        shell: bash
        run: |
          sites=(carta-astral compatibilidad-signos tarot-del-dia calcular-numerologia horoscopo-de-hoy)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.site }}" != "auto" ] && [ -n "${{ inputs.site }}" ]; then
            site="${{ inputs.site }}"
          else
            idx=$(( (10#$(date -u +%j) - 1) % ${#sites[@]} ))
            site="${sites[$idx]}"
          fi

          echo "site=$site" >> "$GITHUB_OUTPUT"
          echo "Selected site: $site"

      - name: "🕵️ Crawl competitors"
        env:
          SITE_KEY: ${{ steps.select.outputs.site }}
          FORCE: ${{ inputs.force }}
        run: node .github/scripts/seo-competitor-intel.js

      - name: "📤 Commit results"
        env:
          SITE_KEY: ${{ steps.select.outputs.site }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "sites/${SITE_KEY}/docs/SEO_COMPETITOR_INTEL.json"
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "chore: update competitor intel ${SITE_KEY} $(date -u +%F)"
            git push
          fi
