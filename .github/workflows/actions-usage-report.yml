name: "💸 Resumen de uso de GitHub Actions"

on:
  schedule:
    - cron: '10 8 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: "📊 Publicar resumen"
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const since = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 100,
              created: `>=${since.toISOString()}`
            });
            const byWorkflow = new Map();
            for (const run of runs) {
              const key = run.name || run.workflow_id || 'unknown';
              const item = byWorkflow.get(key) || { count: 0, failures: 0 };
              item.count += 1;
              if (run.conclusion && run.conclusion !== 'success' && run.conclusion !== 'skipped') item.failures += 1;
              byWorkflow.set(key, item);
            }
            const rows = [...byWorkflow.entries()]
              .sort((a, b) => b[1].count - a[1].count)
              .map(([name, item]) => `| ${name} | ${item.count} | ${item.failures} |`)
              .join('\n') || '| Sin runs | 0 | 0 |';
            const body = [
              'Resumen semanal low-cost de GitHub Actions.',
              '',
              '| Workflow | Runs 7d | No OK |',
              '| --- | ---: | ---: |',
              rows,
              '',
              'Objetivo: detectar picos de CI antes de gastar minutos de forma innecesaria.'
            ].join('\n');
            const title = '💸 Resumen semanal de uso de GitHub Actions';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'ops-actions-usage',
              per_page: 10
            });
            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body, labels: ['ops-actions-usage'] });
            }
