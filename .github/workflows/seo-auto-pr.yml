name: "\U0001F680 SEO Auto Deploy"

on:
  schedule:
    - cron: '35 7 * * 2'
  workflow_dispatch:

concurrency:
  group: seo-auto-pr
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  create-seo-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "\u2699\uFE0F Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: "\U0001F9E0 Apply SEO optimizations"
        id: autopatch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs
          node .github/scripts/seo-auto-pr.js > /tmp/seo-result.json
          changed=$(jq -r '.changedCount' /tmp/seo-result.json)
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          cat /tmp/seo-result.json

      - name: "\U0001F4DD Create PR"
        if: steps.autopatch.outputs.changed != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = `seo/auto-${new Date().toISOString().slice(0,10)}`;
            const { execSync } = require('child_process');
            execSync('git config user.name "SEO Bot"');
            execSync('git config user.email "seo-bot@carta-astral-gratis.es"');
            execSync(`git checkout -b ${branch}`);
            execSync('git add -A');
            execSync(`git commit -m "feat(seo): auto-optimización ${new Date().toISOString().slice(0,10)}"`);
            execSync(`git push origin ${branch}`);
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🧠 SEO Auto-PR ${new Date().toISOString().slice(0,10)}`,
              head: branch,
              base: 'master',
              body: '## SEO Auto-optimization\n\nCambios aplicados automáticamente por el agente SEO.\n\ncc @andres20980'
            });
