name: "\U0001F680 SEO Auto Deploy"

on:
  schedule:
    - cron: '35 7 * * 2'
  workflow_dispatch:

concurrency:
  group: seo-auto-pr
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  auto-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v6

      - name: "\u2699\uFE0F Setup Node"
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: "\U0001F9E0 Apply SEO optimizations"
        id: autopatch
        shell: bash
        working-directory: sites/carta-astral
        run: |
          set -euo pipefail
          mkdir -p docs
          node ../../.github/scripts/seo-auto-pr.js > /tmp/seo-result.json
          changed=$(jq -r '.changedCount' /tmp/seo-result.json)
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          cat /tmp/seo-result.json

      - name: "\U0001F4E4 Push to master"
        if: steps.autopatch.outputs.changed != '0'
        run: |
          set -euo pipefail
          git config user.name "SEO Bot"
          git config user.email "seo-bot@carta-astral-gratis.es"
          git add sites/carta-astral/
          git commit -m "feat(seo): auto-optimización $(date +%Y-%m-%d)"
          git push origin master
